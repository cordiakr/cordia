<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cordia Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
      body { margin: 0; padding: 0; font-family: 'Inter', sans-serif; background: #09090b; color: #fff; }
      nav { background: #18181b; padding: 20px 40px; border-bottom: 1px solid #27272a; display: flex; justify-content: space-between; align-items: center; }
      nav h1 { margin: 0; font-size: 1.2rem; font-weight: 700; color: #60a5fa; }
      .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
      
      #login-container { text-align: center; margin-top: 100px; }
      input[type="password"] { padding: 12px 16px; border-radius: 8px; border: 1px solid #3f3f46; background: #111113; color: #fff; width: 300px; font-size: 1rem; }
      button { padding: 12px 24px; border-radius: 8px; border: none; background: #3b82f6; color: #fff; font-weight: 600; cursor: pointer; font-size: 1rem; }
      
      #admin-dashboard { display: none; }
      .post-card { background: #18181b; border: 1px solid #27272a; border-radius: 12px; padding: 24px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
      .post-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
      .badge { padding: 4px 8px; border-radius: 6px; font-size: 0.8rem; font-weight: 600; }
      .badge.blue { background: rgba(59,130,246,0.2); color: #60a5fa; }
      .badge.gray { background: rgba(161,161,170,0.2); color: #a1a1aa; }
      .title { font-size: 1.2rem; font-weight: 700; margin: 0; }
      .content { font-size: 1rem; color: #d4d4d8; line-height: 1.6; margin: 16px 0; padding: 16px; background: #09090b; border-radius: 8px; }
      .controls { display: flex; gap: 12px; align-items: stretch; margin-top: 20px; }
      select { padding: 12px; border-radius: 8px; border: 1px solid #3f3f46; background: #111113; color: #fff; }
      textarea { flex-grow: 1; padding: 12px; border-radius: 8px; border: 1px solid #3f3f46; background: #111113; color: #fff; resize: vertical; min-height: 48px; }
      .btn-delete { background: #ef4444; }
    </style>
  </head>
  <body>
    <nav>
      <h1>Cordia Admin (Feedback Board)</h1>
    </nav>

    <div class="container">
      <div id="login-container">
        <h2 style="margin-bottom: 20px;">관리자 인증</h2>
        <input type="password" id="admin-pw" placeholder="비밀번호 입력" />
        <button onclick="login()">접속</button>
      </div>

      <div id="admin-dashboard">
        <h2 style="margin-bottom: 20px; border-bottom: 1px solid #27272a; padding-bottom: 16px;">모든 피드백 목록</h2>
        <div id="posts-container">로딩 중...</div>
      </div>
    </div>

    <script>
      let adminPassword = '';
      
      function login() {
        adminPassword = document.getElementById('admin-pw').value;
        if (!adminPassword) return alert('비밀번호를 입력하세요.');
        document.getElementById('login-container').style.display = 'none';
        document.getElementById('admin-dashboard').style.display = 'block';
        fetchData();
      }

      async function fetchData() {
        const res = await fetch('/api/feedback');
        if (!res.ok) return alert('데이터 로드 실패');
        const posts = await res.json();
        
        const container = document.getElementById('posts-container');
        container.innerHTML = '';
        if (posts.length === 0) return container.innerHTML = '<p>게시물이 없습니다.</p>';

        posts.forEach(post => {
          const card = document.createElement('div');
          card.className = 'post-card';
          
          const escapeHTML = str => (str||'').replace(/[&<>'"]/g, tag => ({'&': '&amp;','<': '&lt;','>': '&gt;',"'": '&#39;','"': '&quot;'}[tag]));
          const imageHtml = post.hasImage ? `
              <div style="margin-top: 16px;">
                <img src="/api/feedback/image?id=${post.id}" alt="유저 첨부 이미지" style="max-width: 100%; max-height: 400px; border-radius: 8px; border: 1px solid #3f3f46; display: block;" />
              </div>
            ` : '';
            
            card.innerHTML = `
            <div class="post-header">
              <div style="display:flex; gap: 10px; align-items: center;">
                <span class="badge blue">${post.product.toUpperCase()}</span>
                <span class="badge gray">${post.type}</span>
                <span style="font-size: 0.85rem; color: #71717a;">${new Date(post.createdAt).toLocaleString()}</span>
              </div>
              <strong style="color: #c084fc;">ID: ${post.id}</strong>
            </div>
            <h3 class="title">${escapeHTML(post.title)}</h3>
            <div class="content">
              ${escapeHTML(post.content).replace(/\n/g, '<br/>')}
              ${imageHtml}
            </div>
            
            <div class="controls">
              <select id="status-${post.id}">
                <option value="pending" ${post.status==='pending'?'selected':''}>검토 중 (접수)</option>
                <option value="resolving" ${post.status==='resolving'?'selected':''}>수정/해결 중</option>
                <option value="done" ${post.status==='done'?'selected':''}>답변 완료</option>
              </select>
              <textarea id="reply-${post.id}" placeholder="관리자 답변을 작성하세요...">${escapeHTML(post.reply||'')}</textarea>
              <button onclick="updatePost('${post.id}')" style="background:#10b981;">답변 저장</button>
              <button class="btn-delete" onclick="deletePost('${post.id}')">삭제</button>
            </div>
          `;
          container.appendChild(card);
        });
      }

      async function updatePost(id) {
        const status = document.getElementById(`status-${id}`).value;
        const reply = document.getElementById(`reply-${id}`).value;

        const res = await fetch('/api/feedback', {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json', 'Authorization': adminPassword },
          body: JSON.stringify({ id, status, reply })
        });
        
        if (res.ok) {
          alert('성공적으로 업데이트되었습니다.');
        } else {
          alert('권한이 없거나 실패했습니다. (' + res.status + ')');
        }
      }

      async function deletePost(id) {
        if (!confirm('정말 삭제하시겠습니까?')) return;
        
        const res = await fetch('/api/feedback', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json', 'Authorization': adminPassword },
          body: JSON.stringify({ id })
        });

        if (res.ok) {
          fetchData();
        } else {
          alert('삭제 권한이 없거나 실패했습니다.');
        }
      }
    </script>
  </body>
</html>
