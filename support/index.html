<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>고객지원 및 피드백 - Cordia</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body>
    <main>
      <section id="support">
        <h2 class="section-title">피드백 게시판</h2>
        <p class="section-subtitle">각 앱에 대한 의견이나 버그 리포트를 남겨주세요. 모든 피드백은 Cordia 팀이 꼼꼼히 검토합니다.</p>

        <div class="board-container">
          <!-- 피드백 작성 폼 -->
          <div class="feedback-form-card">
            <h3 style="margin-bottom: 20px; font-size: 1.2rem;">새 의견 작성하기</h3>
            <form id="feedback-form">
              <div class="form-row">
                <div class="form-group">
                  <label for="product">제품 선택</label>
                  <select id="product" name="product" required>
                    <option value="" disabled selected>제품을 선택하세요</option>
                    <option value="vida">VIDA</option>
                    <option value="cordiafe">Cordia FE</option>
                    <option value="newtoncommander">Newton Commander</option>
                    <option value="keymap">KeyMap</option>
                    <option value="quickfolder">Quick Folder</option>
                    <option value="scapc">scapC</option>
                    <option value="bluepass">BluePass</option>
                    <option value="epgmn">EPGMN</option>
                    <option value="eyecatch">EyeCatch</option>
                    <option value="eshub">EsHub</option>
                  </select>
                </div>
                <div class="form-group">
                  <label for="type">분류</label>
                  <select id="type" name="type" required>
                    <option value="bug">버그 리포트</option>
                    <option value="feature">기능 제안</option>
                    <option value="general">일반 문의</option>
                  </select>
                </div>
              </div>

              <div class="form-group">
                <label for="title">제목</label>
                <input type="text" id="title" name="title" placeholder="피드백 제목을 간단히 적어주세요." required />
              </div>

              <div class="form-group">
                <label for="content">내용</label>
                <textarea id="content" name="content" rows="4" placeholder="상세한 내용을 적어주시면 개선에 큰 도움이 됩니다." required></textarea>
              </div>

              <div class="form-row">
                <div class="form-group" style="flex:1;">
                  <label for="image">캡쳐 이미지 첨부 (선택)</label>
                  <input type="file" id="image" name="image" accept="image/*" />
                </div>
                <div class="form-group" style="flex:1;">
                  <label for="password">글 비밀번호 (수정/삭제용)</label>
                  <input type="password" id="password" name="password" placeholder="나중에 수정/삭제할 때 사용할 암호 설정" required />
                </div>
              </div>

              <button type="submit" class="submit-button" style="margin-top: 10px;">제출하기</button>
            </form>
          </div>

          <!-- 게시물 목록 (Mock UI) -->
          <div class="board-list">
            <h3 style="margin-bottom: 20px; font-size: 1.2rem;">최근 피드백 목록</h3>
            <table class="board-table">
              <thead>
                <tr>
                  <th width="15%">제품</th>
                  <th width="15%">분류</th>
                  <th>제목</th>
                  <th width="15%">상태</th>
                </tr>
              </thead>
              <tbody id="board-tbody">
                <tr>
                  <td><span class="badge blue">VIDA</span></td>
                  <td>기능 제안</td>
                  <td class="board-title">smi 자막 파일 외에 확장 툴 지원 요청</td>
                  <td><span class="status-badge pending">검토 중</span></td>
                </tr>
                <tr>
                  <td><span class="badge purple">Cordia FE</span></td>
                  <td>버그 리포트</td>
                  <td class="board-title">M3 칩 환경에서 패널 전환 시 간헐적 지연 발생</td>
                  <td><span class="status-badge resolving">수정 중</span></td>
                </tr>
                <tr>
                  <td><span class="badge green">Quick Folder</span></td>
                  <td>일반 문의</td>
                  <td class="board-title">단축키 커스텀 설정은 어떻게 하나요?</td>
                  <td><span class="status-badge done">답변 완료</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/main.js"></script>
    <script>
      // Load and render board list
      const tbody = document.getElementById('board-tbody');
      const submitBtn = document.querySelector('.submit-button');
      
      const productMap = {
        vida: { name: 'VIDA', color: 'blue' },
        cordiafe: { name: 'Cordia FE', color: 'purple' },
        newtoncommander: { name: 'Newton Commander', color: 'purple' },
        quickfolder: { name: 'Quick Folder', color: 'green' },
        keymap: { name: 'KeyMap', color: 'yellow' },
        scapc: { name: 'scapC', color: 'pink' },
        bluepass: { name: 'BluePass', color: 'blue' },
        epgmn: { name: 'EPGMN', color: 'purple' },
        eyecatch: { name: 'EyeCatch', color: 'pink' },
        eshub: { name: 'EsHub', color: 'yellow' }
      };

      const typeMap = {
        bug: '버그 리포트',
        feature: '기능 제안',
        general: '일반 문의'
      };

      const statusMap = {
        pending: { label: '접수(검토 중)', class: 'pending' },
        resolving: { label: '수정 중', class: 'resolving' },
        done: { label: '답변 완료', class: 'done' }
      };

      async function fetchPosts() {
        try {
          const res = await fetch('/api/feedback');
          if (!res.ok) return;
          const posts = await res.json();
          
          tbody.innerHTML = '';
          posts.forEach(post => {
            const tr = document.createElement('tr');
            tr.style.cursor = 'pointer';
            tr.classList.add('post-row');
            tr.onclick = () => {
              const detailTr = document.getElementById(`detail-${post.id}`);
              if (detailTr) {
                const isHidden = detailTr.style.display === 'none';
                document.querySelectorAll('.detail-row').forEach(el => el.style.display = 'none');
                detailTr.style.display = isHidden ? 'table-row' : 'none';
              }
            };
            
            const pInfo = productMap[post.product] || { name: post.product, color: 'blue' };
            const typeStr = typeMap[post.type] || post.type;
            const sInfo = statusMap[post.status] || { label: '검토 중', class: 'pending' };

            const escapeHTML = str => (str||'').replace(/[&<>'"]/g, tag => ({'&': '&amp;','<': '&lt;','>': '&gt;',"'": '&#39;','"': '&quot;'}[tag]));

            tr.innerHTML = `
              <td><span class="badge ${pInfo.color}">${pInfo.name}</span></td>
              <td>${typeStr}</td>
              <td class="board-title">${escapeHTML(post.title)}</td>
              <td><span class="status-badge ${sInfo.class}">${sInfo.label}</span></td>
            `;
            tbody.appendChild(tr);

            const detailTr = document.createElement('tr');
            detailTr.id = `detail-${post.id}`;
            detailTr.className = 'detail-row';
            detailTr.style.display = 'none';
            
            const replyHtml = post.reply ? `
              <div style="margin-top: 20px; padding: 16px 20px; background: rgba(59, 130, 246, 0.08); border: 1px solid rgba(59,130,246,0.2); border-radius: 8px;">
                <strong style="color:#60a5fa; display:block; margin-bottom:8px; font-size:0.95rem;">코르디아 지원팀 답변</strong>
                <div style="color: #e4e4e7; line-height: 1.6;">${escapeHTML(post.reply).replace(/\n/g, '<br/>')}</div>
              </div>
            ` : '';

            const imageHtml = post.hasImage ? `
              <div style="margin-top: 16px;">
                <img src="/api/feedback/image?id=${post.id}" alt="유저 첨부 이미지" style="max-width: 100%; max-height: 400px; border-radius: 8px; border: 1px solid #3f3f46; display: block;" />
              </div>
            ` : '';

            detailTr.innerHTML = `
              <td colspan="4" style="padding: 24px; text-align: left; background: #111113; border-bottom: 1px solid #27272a;">
                <div style="color: #a1a1aa; line-height: 1.6; font-size: 1rem; border-left: 3px solid #3f3f46; padding-left: 16px;" id="post-content-${post.id}">
                  ${escapeHTML(post.content).replace(/\n/g, '<br/>')}
                  ${imageHtml}
                </div>
                ${replyHtml}

                <div style="text-align: right; margin-top: 16px;">
                  <button type="button" onclick="document.getElementById('manage-${post.id}').style.display='block'" style="background: none; border: 1px solid #3f3f46; color: #a1a1aa; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85rem;">내 게시물 수정/삭제</button>
                </div>
                <div id="manage-${post.id}" style="display: none; margin-top: 16px; background: #18181b; padding: 16px; border: 1px solid #27272a; border-radius: 8px;">
                  <div style="margin-bottom: 12px;">
                    <input type="password" id="manage-pwd-${post.id}" placeholder="게시물 설정 시 입력한 비밀번호" style="padding: 8px; border-radius: 4px; border: 1px solid #3f3f46; background: #09090b; color: #fff; width: 220px;" />
                  </div>
                  <div style="margin-bottom: 12px;">
                    <input type="text" id="manage-title-${post.id}" value="${escapeHTML(post.title)}" style="padding: 8px; border-radius: 4px; border: 1px solid #3f3f46; background: #09090b; color: #fff; width: 100%; box-sizing: border-box;" />
                  </div>
                  <div style="margin-bottom: 12px;">
                    <textarea id="manage-content-${post.id}" rows="4" style="padding: 8px; border-radius: 4px; border: 1px solid #3f3f46; background: #09090b; color: #fff; width: 100%; box-sizing: border-box;">${post.content}</textarea>
                  </div>
                  <div>
                    <button type="button" onclick="userUpdatePost('${post.id}')" style="padding: 8px 16px; background: #3b82f6; border: none; color: #fff; border-radius: 4px; cursor: pointer;">본문 수정 완료</button>
                    <button type="button" onclick="userDeletePost('${post.id}')" style="padding: 8px 16px; background: #ef4444; border: none; color: #fff; border-radius: 4px; cursor: pointer; margin-left: 8px;">해당 글 영구 삭제</button>
                    <button type="button" onclick="document.getElementById('manage-${post.id}').style.display='none'" style="padding: 8px 16px; background: transparent; border: 1px solid #3f3f46; color: #a1a1aa; border-radius: 4px; cursor: pointer; margin-left: 8px;">취소</button>
                  </div>
                </div>
              </td>
            `;
            tbody.appendChild(detailTr);
          });
        } catch(e) { console.error('Failed to load posts', e); }
      }

      // Initial load
      fetchPosts();

      // Image Compression Helper
      async function readImageFile(file) {
        return new Promise((resolve) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const maxW = 1000;
              const scale = img.width > maxW ? maxW / img.width : 1;
              canvas.width = img.width * scale;
              canvas.height = img.height * scale;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
              resolve(canvas.toDataURL('image/jpeg', 0.7)); 
            };
            img.src = e.target.result;
          };
          reader.readAsDataURL(file);
        });
      }

      // Submit form
      document.getElementById('feedback-form').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        submitBtn.disabled = true;
        submitBtn.textContent = '제출 중 (이미지 압축 및 서버 전송)...';

        const fileInput = document.getElementById('image');
        let imageBase64 = null;
        if (fileInput.files.length > 0) {
          imageBase64 = await readImageFile(fileInput.files[0]);
        }

        const data = {
          product: document.getElementById('product').value,
          type: document.getElementById('type').value,
          title: document.getElementById('title').value,
          content: document.getElementById('content').value,
          password: document.getElementById('password').value,
          imageBase64
        };

        try {
          const res = await fetch('/api/feedback', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
          });

          if (res.ok) {
            alert('피드백이 성공적으로 등록되었습니다. 즉시 확인 후 처리하겠습니다!');
            e.target.reset();
            fetchPosts(); // Reload board
          } else {
            alert('등록에 실패했습니다. 다시 시도해 주세요.');
          }
        } catch(err) {
          alert('네트워크 오류가 발생했습니다.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = '제출하기';
        }
      });

      // User Update handler
      window.userUpdatePost = async function(id) {
        const pwd = document.getElementById(`manage-pwd-${id}`).value;
        const title = document.getElementById(`manage-title-${id}`).value;
        const content = document.getElementById(`manage-content-${id}`).value;

        if (!pwd) return alert('비밀번호를 입력해주세요.');

        try {
          const res = await fetch('/api/feedback', {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json', 'Authorization': pwd },
            body: JSON.stringify({ id, title, content })
          });
          if (res.ok) {
            alert('수정 완료!');
            fetchPosts();
          } else {
            alert('비밀번호가 틀렸습니다. (또는 권한 없음)');
          }
        } catch(e) { alert('네트워크 오류 발생'); }
      };

      // User Delete handler
      window.userDeletePost = async function(id) {
        const pwd = document.getElementById(`manage-pwd-${id}`).value;
        if (!pwd) return alert('비밀번호를 입력해주세요.');
        if (!confirm('복구할 수 없습니다. 삭제하시겠습니까?')) return;

        try {
          const res = await fetch('/api/feedback', {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json', 'Authorization': pwd },
            body: JSON.stringify({ id })
          });
          if (res.ok) {
            alert('삭제 완료!');
            fetchPosts();
          } else {
            alert('비밀번호가 틀렸거나 권한이 없습니다.');
          }
        } catch(e) { alert('네트워크 오류 발생'); }
      };
    </script>
  </body>
</html>
